services:

  phpfpm:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - .:/var/www/html:ro
      - ./assets/brand:/var/www/html/public/assets/brand:ro
      - db_storage:/var/www/html/storage
    restart: unless-stopped
    networks:
      - site_net

  nginx:
    image: nginx:alpine
    ports:
      - "${SITE_PORT:-3000}:80"
    volumes:
      - .:/var/www/html:ro
      - ./assets/brand:/var/www/html/public/assets/brand:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - db_storage:/var/www/html/storage:ro
    depends_on:
      - phpfpm
    restart: unless-stopped
    networks:
      - site_net

volumes:
  db_storage:   # persists SQLite DB across restarts/deploys

networks:
  site_net:
    driver: bridge

