services:

  phpfpm:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    volumes:
      - db_storage:/var/www/html/storage
      - app_public:/var/www/html/public
    restart: unless-stopped
    networks:
      - site_net

  nginx:
    image: nginx:alpine
    volumes:
      - app_public:/var/www/html/public:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - db_storage:/var/www/html/storage:ro
    depends_on:
      - phpfpm
    restart: unless-stopped
    networks:
      - site_net

volumes:
  db_storage:   # persists SQLite DB across restarts/deploys
  app_public:   # shared public assets between phpfpm and nginx

networks:
  site_net:
    driver: bridge
