services:

  phpfpm:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: phpfpm
    env_file: .env
    volumes:
      - db_storage:/var/www/html/storage
    restart: unless-stopped
    networks:
      - site_net

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: nginx
    volumes:
      - db_storage:/var/www/html/storage:ro
    depends_on:
      - phpfpm
    restart: unless-stopped
    networks:
      - site_net

volumes:
  db_storage:   # persists SQLite DB across restarts/deploys

networks:
  site_net:
    driver: bridge
